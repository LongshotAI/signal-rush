<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Signal Rush Ads</title>
  <link rel="stylesheet" href="/portal/shared.css">
  <style>
    /* Page-specific: center the auth card */
    body { background: var(--bg-primary); }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>⚡ Signal Rush</h1>
        <p>Advertiser Portal</p>
      </div>

      <div class="card">
        <form id="loginForm">
          <div id="alertContainer"></div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
            Log In
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/portal/signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="/portal/api.js"></script>
  <script>
    // Redirect if already logged in
    if (API.isLoggedIn()) {
      window.location.href = '/portal/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alertContainer');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(message, type = 'error') {
      alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    }

    function clearAlerts() {
      alertContainer.innerHTML = '';
    }

    async function handleSubmit(e) {
      e.preventDefault();
      clearAlerts();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Logging in…';

      try {
        const data = await API.login(email, password);
        if (data.ok) {
          window.location.href = '/portal/dashboard.html';
        } else {
          showAlert(data.error || 'Login failed.');
        }
      } catch (err) {
        showAlert(err.message || 'Login failed. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    }

    form.addEventListener('submit', handleSubmit);
  </script>
</body>
</html>
