<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <!-- CSP: scripts must be external (no inline). Allows same-origin, Telegram SDK, and Cloudflare Insights (injected by CDN). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://telegram.org https://static.cloudflareinsights.com; connect-src 'self' https://telegram.org; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-ancestors https://telegram.org; base-uri 'self'; form-action 'self'" />
  <title>Signal Rush</title>

  <!-- Telegram Mini App SDK loaded dynamically by telegram-sdk.js (non-blocking) -->

  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100dvh;
      height: 100vh; /* fallback for browsers without dvh support */
      min-height: 100vh;
      min-height: 100dvh;
      background: #06060f;
      color: #fff;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4px 0 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    @keyframes sr-spin { to { transform: rotate(360deg); } }
    /* Flex children: don't shrink header/chips, let game container fill remaining space */
    #header, #mode-selector-bar, #controls-hint {
      flex-shrink: 0;
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      text-align: center;
      padding: 2px 0 1px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
    }
    #header p {
      font-size: 9px;
      color: rgba(255,255,255,0.40);
      margin-top: 0;
      transition: opacity 0.3s;
    }

    /* ── Mode selector bar ─────────────────────────────────── */
    #mode-selector-bar {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 2px;
      padding: 0 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── Game container ────────────────────────────────────── */
    #game-container {
      position: relative;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      flex: 1 1 0%;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Controls hint ─────────────────────────────────────── */
    #controls-hint {
      margin-top: 4px;
      text-align: center;
      font-size: 9px;
      color: rgba(255,255,255,0.20);
      flex-shrink: 0;
    }
    #controls-hint kbd {
      display: none;
    }

    /* Hide keyboard hints on mobile */
    @media (hover: none) and (pointer: coarse) {
      #controls-hint { display: none !important; }
    }

    /* ── Game Over Sponsor Ad ──────────────────────────────── */
    #sponsor-gameover-overlay {
      flex-shrink: 0;
    }
    #sponsor-gameover-overlay > div {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>⚡ SIGNAL RUSH</h1>
    <p id="game-subtitle">Dodge AI. Chase pickups. Survive.</p>
  </div>

  <!-- Mode selector bar — populated by game.js -->
  <div id="mode-selector-bar"></div>

  <div id="game-container">
    <!-- Loading spinner — shown until game.init() replaces this -->
    <div id="loading-spinner" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06060f;z-index:1;">
      <div style="width:40px;height:40px;border:3px solid rgba(0,255,136,0.2);border-top-color:#00ff88;border-radius:50%;animation:sr-spin 0.8s linear infinite;"></div>
      <p style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:12px;letter-spacing:1px;">LOADING…</p>
    </div>
  </div>

  <div id="controls-hint"></div>

  <script type="module" src="./entry.js?v=20260630"></script>
</body>
</html>
