<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Signal Rush</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100dvh;
      background: #06060f;
      color: #fff;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4px 0 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      text-align: center;
      padding: 4px 0 2px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
    }
    #header p {
      font-size: 10px;
      color: rgba(255,255,255,0.40);
      margin-top: 1px;
      transition: opacity 0.3s;
    }

    /* ── Mode selector bar ─────────────────────────────────── */
    #mode-selector-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 6px;
      padding: 0 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── Game container ────────────────────────────────────── */
    #game-container {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,255,136,0.08), 0 0 60px rgba(255,51,85,0.05);
      flex-shrink: 1;
      max-width: 100%;
    }

    /* ── Controls hint ─────────────────────────────────────── */
    #controls-hint {
      margin-top: 4px;
      text-align: center;
      font-size: 9px;
      color: rgba(255,255,255,0.20);
      flex-shrink: 0;
    }
    #controls-hint kbd {
      display: none;
    }

    /* Hide keyboard hints on mobile */
    @media (hover: none) and (pointer: coarse) {
      #controls-hint { display: none !important; }
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>⚡ SIGNAL RUSH</h1>
    <p id="game-subtitle">Dodge AI. Chase pickups. Survive.</p>
  </div>

  <!-- Mode selector bar — populated by game.js -->
  <div id="mode-selector-bar"></div>

  <div id="game-container"></div>

  <div id="controls-hint"></div>

  <script type="module">
    import { init, destroy } from './game.js';

    let engine = await init('#game-container');

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyP' && engine) {
        engine.step({ pause: true });
      }
      if (e.code === 'KeyR' && engine) {
        engine.reset();
      }
    });

    window.addEventListener('beforeunload', () => {
      destroy();
    });
  </script>
</body>
</html>
