<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Signal Rush</title>

  <!-- Telegram Mini App SDK loaded dynamically by telegram-sdk.js (non-blocking) -->

  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100dvh;
      height: 100vh; /* fallback for browsers without dvh support */
      min-height: 100vh;
      min-height: 100dvh;
      background: #06060f;
      color: #fff;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4px 0 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    @keyframes sr-spin { to { transform: rotate(360deg); } }
    /* Flex children: don't shrink header/chips, let game container fill remaining space */
    #header, #mode-selector-bar, #controls-hint {
      flex-shrink: 0;
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      text-align: center;
      padding: 2px 0 1px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
    }
    #header p {
      font-size: 9px;
      color: rgba(255,255,255,0.40);
      margin-top: 0;
      transition: opacity 0.3s;
    }

    /* ── Mode selector bar ─────────────────────────────────── */
    #mode-selector-bar {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 2px;
      padding: 0 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── Game container ────────────────────────────────────── */
    #game-container {
      position: relative;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      flex: 1 1 0%;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Controls hint ─────────────────────────────────────── */
    #controls-hint {
      margin-top: 4px;
      text-align: center;
      font-size: 9px;
      color: rgba(255,255,255,0.20);
      flex-shrink: 0;
    }
    #controls-hint kbd {
      display: none;
    }

    /* Hide keyboard hints on mobile */
    @media (hover: none) and (pointer: coarse) {
      #controls-hint { display: none !important; }
    }

    /* ── Game Over Sponsor Ad ──────────────────────────────── */
    #sponsor-gameover-overlay {
      flex-shrink: 0;
    }
    #sponsor-gameover-overlay > div {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>⚡ SIGNAL RUSH</h1>
    <p id="game-subtitle">Dodge AI. Chase pickups. Survive.</p>
  </div>

  <!-- Mode selector bar — populated by game.js -->
  <div id="mode-selector-bar"></div>

  <div id="game-container">
    <!-- Loading spinner — shown until game.init() replaces this -->
    <div id="loading-spinner" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06060f;z-index:1;">
      <div style="width:40px;height:40px;border:3px solid rgba(0,255,136,0.2);border-top-color:#00ff88;border-radius:50%;animation:sr-spin 0.8s linear infinite;"></div>
      <p style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:12px;letter-spacing:1px;">LOADING…</p>
    </div>
  </div>

  <div id="controls-hint"></div>

  <script type="module">
    import { init, destroy } from './game.js';

    // Global error overlay — catches ANY error during init or runtime
    function showError(title, detail) {
      const ov = document.createElement('div');
      ov.id = 'error-overlay';
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;color:#ff3355;font-family:monospace;font-size:12px;padding:16px;overflow:auto;white-space:pre-wrap;word-break:break-word;';
      ov.textContent = title + '\n\n' + detail;
      document.body.appendChild(ov);
      // Also hide loading spinner so error is visible
      const spinner = document.getElementById('loading-spinner');
      if (spinner) spinner.style.display = 'none';
    }
    window.addEventListener('error', (e) => showError('JS Error: ' + e.message, e.error?.stack || ''));
    window.addEventListener('unhandledrejection', (e) => showError('Promise Rejection:', e.reason?.stack || String(e.reason)));

    // Timeout: if init hasn't resolved/rejected in 15s, show diagnostic
    const loadTimeout = setTimeout(() => {
      showError('Game stuck loading after 15 seconds',
        'window.Telegram: ' + (window.Telegram ? 'exists' : 'missing') + '\n' +
        'Telegram.WebApp: ' + (window.Telegram?.WebApp ? 'exists' : 'missing') + '\n' +
        'userAgent: ' + navigator.userAgent.substring(0, 100) + '\n' +
        'scripts loaded: ' + document.querySelectorAll('script').length + '\n' +
        'game-container: ' + (document.getElementById('game-container') ? 'exists' : 'missing')
      );
    }, 15000);

    try {
      let engine = await init('#game-container');
      clearTimeout(loadTimeout);

      // Runtime sanity check: after 3 seconds, verify canvas is visible
      setTimeout(() => {
        const canvas = document.querySelector('canvas');
        const bar = document.getElementById('mode-selector-bar');
        const chips = bar ? bar.querySelectorAll('button') : [];
        let diag = 'SANITY CHECK (3s after load):\n';
        diag += 'canvas: ' + (canvas ? canvas.width + 'x' + canvas.height : 'MISSING') + '\n';
        diag += 'canvas visible: ' + (canvas && canvas.width > 0 && canvas.offsetParent !== null ? 'YES' : 'NO') + '\n';
        diag += 'mode chips: ' + chips.length + '\n';
        diag += 'game-container: ' + (() => { const c = document.getElementById('game-container'); return c ? c.offsetWidth + 'x' + c.offsetHeight : 'MISSING'; })() + '\n';
        diag += 'game-wrapper: ' + (() => { const w = document.getElementById('game-wrapper'); return w ? w.offsetWidth + 'x' + w.offsetHeight : 'MISSING'; })() + '\n';
        diag += 'body size: ' + window.innerWidth + 'x' + window.innerHeight + '\n';
        if ((engine) && (!canvas || canvas.width < 10 || chips.length === 0)) {
          showError('Game loaded but UI is broken:\n' + diag, 'Check console for details.');
        }
        console.log('[SignalRush] ' + diag);
      }, 3000);

      window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyP' && engine) {
          engine.step({ pause: true });
        }
        if (e.code === 'KeyR' && engine) {
          engine.reset();
        }
      });

      window.addEventListener('beforeunload', () => {
        destroy();
      });
    } catch (err) {
      console.error('[SignalRush] Init failed:', err);
      showError('Init failed: ' + err.message, err.stack || '');
      const container = document.querySelector('#game-container');
      if (container) {
        container.innerHTML = `<div style="color:#ff3355;padding:20px;text-align:center;font-family:monospace;">
          Failed to load game: ${err.message}<br>
          <small>${err.stack || ''}</small>
        </div>`;
      }
    }
  </script>
</body>
</html>
