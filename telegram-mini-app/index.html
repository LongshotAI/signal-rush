<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Signal Rush — AI Hunt</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #06060f;
      color: #fff;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;           /* prevent browser zoom/scroll globally */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      text-align: center;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
    }
    #header p {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* ── Mode selector bar ─────────────────────────────────── */
    #mode-selector-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── Game container ────────────────────────────────────── */
    #game-container {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,255,136,0.08), 0 0 60px rgba(255,51,85,0.05);
      flex-shrink: 0;
    }

    /* ── Controls hint ─────────────────────────────────────── */
    #controls-hint {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.30);
      line-height: 1.6;
      flex-shrink: 0;
    }
    #controls-hint kbd {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: rgba(255,255,255,0.6);
    }

    /* ── Mobile touch controls (legacy D-pad, now handled by touch-input.js) ── */
    #touch-controls {
      display: none;
      margin-top: 16px;
      gap: 4px;
    }
    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: grid; }
    }
    #touch-controls .d-pad {
      display: grid;
      grid-template-columns: 48px 48px 48px;
      grid-template-rows: 48px 48px 48px;
      gap: 4px;
      justify-content: center;
    }
    #touch-controls button {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    #touch-controls button:active {
      background: rgba(0,255,136,0.15);
      border-color: rgba(0,255,136,0.3);
      color: #00ff88;
    }
    #touch-controls .spacer { visibility: hidden; }

    /* ── Telegram D-pad overlay (injected by touch-input.js) ── */
    #touch-dpad {
      /* Styled inline by touch-input.js */
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>⚡ SIGNAL RUSH</h1>
    <p>AI HUNT MODE — Dodge noise. Collect credits. Survive.</p>
  </div>

  <!-- Mode selector bar — populated by game.js -->
  <div id="mode-selector-bar"></div>

  <div id="game-container"></div>

  <div id="controls-hint">
    <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>↑</kbd> <kbd>←</kbd> <kbd>↓</kbd> <kbd>→</kbd> to move &nbsp;·&nbsp;
    <kbd>P</kbd> pause &nbsp;·&nbsp;
    <kbd>R</kbd> restart
  </div>

  <div id="touch-controls">
    <div class="d-pad">
      <button class="spacer"></button>
      <button id="btn-up">↑</button>
      <button class="spacer"></button>
      <button id="btn-left">←</button>
      <button class="spacer"></button>
      <button id="btn-right">→</button>
      <button class="spacer"></button>
      <button id="btn-down">↓</button>
      <button class="spacer"></button>
    </div>
  </div>

  <!--
    Load the game renderer as an ES module.
    The engine bundle is imported by game.js via its absolute path.
  -->
  <script type="module">
    import { init, destroy } from './game.js';

    // ── Bootstrap ───────────────────────────────────────────
    let engine = await init('#game-container');

    // ── Extra keyboard shortcuts ────────────────────────────
    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyP' && engine) {
        engine.step({ pause: true });
      }
      if (e.code === 'KeyR' && engine) {
        engine.reset();
      }
    });

    // ── Touch D-pad (legacy — also handled by touch-input.js) ──
    function bindTouchBtn(id, code) {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        window.dispatchEvent(new KeyboardEvent('keydown', { code }));
      });
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        window.dispatchEvent(new KeyboardEvent('keyup', { code }));
      });
      btn.addEventListener('mousedown', () => {
        window.dispatchEvent(new KeyboardEvent('keydown', { code }));
      });
      btn.addEventListener('mouseup', () => {
        window.dispatchEvent(new KeyboardEvent('keyup', { code }));
      });
    }
    bindTouchBtn('btn-up',    'ArrowUp');
    bindTouchBtn('btn-down',  'ArrowDown');
    bindTouchBtn('btn-left',  'ArrowLeft');
    bindTouchBtn('btn-right', 'ArrowRight');

    // ── Cleanup on page unload ──────────────────────────────
    window.addEventListener('beforeunload', () => {
      destroy();
    });
  </script>
</body>
</html>
